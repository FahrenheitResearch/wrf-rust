name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        run: cargo test --workspace --all-targets

  python-wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and install extension
        run: |
          python -m pip install --upgrade pip maturin
          maturin develop --release
      - name: Import smoke test
        run: |
          python - <<'PY'
          import wrf
          expected = "0.2.35"
          assert wrf.__version__ == expected, (wrf.__version__, expected)
          for name in [
              "WrfFile", "getvar", "getvar_all_times", "ALL_TIMES",
              "list_variables", "available_variables", "interplevel",
              "latlon_coords", "ll_to_xy",
          ]:
              assert hasattr(wrf, name), name
          PY

  release-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version and public docs
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib

          root = pathlib.Path(".")
          pyproject = tomllib.loads((root / "pyproject.toml").read_text())
          cargo = tomllib.loads((root / "Cargo.toml").read_text())
          init_text = (root / "python" / "wrf" / "__init__.py").read_text()
          fallback = re.search(r'__version__ = "([^"]+)"', init_text).group(1)

          expected = pyproject["project"]["version"]
          assert cargo["package"]["version"] == expected
          assert fallback == expected
          for manifest in (root / "crates").glob("*/Cargo.toml"):
              data = tomllib.loads(manifest.read_text())
              assert data["package"]["version"] == expected, manifest
          assert (root / "docs" / "API_COMPATIBILITY.md").exists()
          readme = (root / "README.md").read_text()
          assert "docs/API_COMPATIBILITY.md" in readme
          PY
