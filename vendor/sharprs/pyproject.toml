[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "sharprs"
version = "0.1.0"
description = "Sounding/Hodograph Analysis and Research Program — Rust-accelerated Python bindings"
license = { text = "BSD-3-Clause" }
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
]
dependencies = [
    "numpy>=1.21",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "maturin",
]

[tool.maturin]
# Activate the "python" feature for PyO3 + numpy bindings
features = ["python"]
# Python module name matches the crate name
module-name = "sharprs"
# Build a single wheel for the current platform
python-source = false
